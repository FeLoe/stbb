{{ $months_de := slice "" "Jan" "Feb" "Mrz" "Apr" "Mai" "Jun" "Jul" "Aug" "Sep" "Okt" "Nov" "Dez" }}
{{ $monthNum := .Date | time.Format "1" | int }}
{{ $month := index $months_de $monthNum }}

<a href="{{ .RelPermalink }}" class="event-card-link">
  <div class="event-card">
    <div class="event-card-date">
      <span class="ecd-day">{{ .Date | time.Format "2" }}</span>
      <span class="ecd-month">{{ $month }}</span>
    </div>
    <div class="event-card-info">
      <span class="event-card-title">{{ .Title }}</span>
      {{ with .Params.location }}<span class="event-card-location">{{ . }}</span>{{ end }}
    </div>
  </div>
</a>
