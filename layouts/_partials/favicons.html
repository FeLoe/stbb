{{ $logo := resources.Get "media/logo.png" }}
{{ if $logo }}
  {{ $favicon32 := $logo.Resize "32x32 png" }}
  {{ $favicon16 := $logo.Resize "16x16 png" }}
  {{ $apple    := $logo.Resize "180x180 png" }}
  <link rel="apple-touch-icon" sizes="180x180" href="{{ $apple.RelPermalink }}" />
  <link rel="icon" type="image/png" sizes="32x32" href="{{ $favicon32.RelPermalink }}" />
  <link rel="icon" type="image/png" sizes="16x16" href="{{ $favicon16.RelPermalink }}" />
{{ end }}
