title: Steve Taylor Blues Band
baseURL: "https://steve-taylor-blues.band"

############################
## LANGUAGE
############################

defaultContentLanguage: de
hasCJKLanguage: false
defaultContentLanguageInSubdir: false
removePathAccents: true

############################
## MODULES
############################

module:
  imports:
    - path: github.com/jpanther/congo/v2

############################
## ADVANCED
############################

enableGitInfo: false
summaryLength: 30
pagination:
  pagerSize: 10
enableEmoji: true
enableRobotsTXT: true
buildFuture: true

ignoreFiles: [\.DS_Store]

outputs:
  home: [HTML, RSS, JSON]
  section: [HTML, RSS]

imaging:
  resampleFilter: lanczos
  quality: 75
  anchor: smart

timeout: 600000

taxonomies:
  tag: tags
  category: categories

markup:
  goldmark:
    renderer:
      unsafe: true
  tableOfContents:
    startLevel: 2
    endLevel: 4

sitemap:
  changefreq: monthly
  priority: 0.5
