backend:
  name: git-gateway
  branch: main

media_folder: "assets/media"
public_folder: "media"

locale: de

collections:

  - name: events
    label: Auftritte
    label_singular: Auftritt
    description: "Hier kannst du Konzerttermine hinzufügen, bearbeiten oder löschen. Gespeicherte Änderungen sind nach ein paar Minuten live auf der Webseite."
    folder: content/event
    create: true
    path: "{{slug}}/index"
    identifier_field: title
    sortable_fields: ["date", "title"]
    fields:
      - label: "Titel"
        name: title
        widget: string
        hint: "z.B. Konzert im Café Hahn / Koblenz"
      - label: "Datum & Uhrzeit"
        name: date
        widget: datetime
        date_format: "DD.MM.YYYY"
        time_format: "HH:mm"
        format: "YYYY-MM-DDTHH:mm:00Z"
        hint: "Datum und Uhrzeit des Konzerts."
      - label: "Ort"
        name: location
        widget: string
        hint: "z.B. Koblenz oder Café Hahn, Koblenz"
      - label: "Veröffentlichungsdatum"
        name: publishDate
        widget: datetime
        format: "YYYY-MM-DDTHH:mm:00Z"
        default: ""
        hint: "Wann soll der Termin auf der Webseite erscheinen? Normalerweise gleich wie das Konzertdatum."
      - label: "Website / Link (optional)"
        name: url
        widget: string
        required: false
        hint: "Link zur Veranstaltung oder zum Veranstaltungsort – wird als Button auf der Konzertseite angezeigt."
      - label: "Foto (optional)"
        name: image
        widget: image
        required: false
        hint: "Ein Foto zum Konzert, z.B. vom Veranstaltungsort. Wird auf der Konzertseite angezeigt."
        media_library:
          config:
            multiple: false

  - name: posts
    label: Presse & News
    label_singular: Artikel
    description: "Hier kannst du Neuigkeiten und Presseberichte veröffentlichen. Titel, Datum und Text sind Pflichtfelder – alles andere ist optional. Nach dem Speichern ist der Artikel nach ein paar Minuten live."
    folder: content/post
    create: true
    path: "{{slug}}/index"
    identifier_field: title
    sortable_fields: ["date", "title"]
    fields:
      - label: "Titel"
        name: title
        widget: string
        hint: "z.B. STBB beim Deichstadtfest Neuwied"
      - label: "Datum"
        name: date
        widget: datetime
        date_format: "DD.MM.YYYY"
        time_format: false
        format: "YYYY-MM-DDT00:00:00Z"
        hint: "Datum der Meldung."
      - label: "Text"
        name: body
        widget: markdown
        hint: "Hier den vollständigen Artikel schreiben. Für einen Link: Text markieren und auf das Link-Symbol in der Werkzeugleiste klicken."
      - label: "Foto (optional)"
        name: image
        widget: image
        required: false
        hint: "Titelbild des Artikels. Wird oben auf der Artikelseite angezeigt."
        media_library:
          config:
            multiple: false
      - label: "Link (optional)"
        name: url
        widget: string
        required: false
        hint: "Link zu einem externen Artikel, z.B. einem Zeitungsbericht. Wird als Button auf der Seite angezeigt."
      - label: "Kurzbeschreibung (optional)"
        name: summary
        widget: text
        required: false
        hint: "Kurzer Teaser-Text für die Übersichtsseite. Wenn leer, wird automatisch der Anfang des Textes verwendet."

  - name: gallery
    label: Galerie
    label_singular: Foto
    description: "Hier kannst du Fotos zur Bildergalerie hinzufügen oder entfernen. Bitte nur querformatige oder hochformatige JPG-Dateien hochladen."
    folder: content/gallery
    create: true
    path: "{{slug}}/index"
    identifier_field: title
    fields:
      - label: "Foto"
        name: image
        widget: image
        hint: "Foto auswählen oder per Drag & Drop hochladen."
        media_library:
          config:
            multiple: false
      - label: "Beschriftung (optional)"
        name: title
        widget: string
        required: false
        default: ""
        hint: "Kurze Beschriftung, z.B. 'Kulturfabrik Koblenz, September 2024'. Wird unter dem Foto angezeigt."
      - label: "Reihenfolge (optional)"
        name: weight
        widget: number
        value_type: int
        required: false
        hint: "Position in der Galerie – niedrigere Zahl erscheint weiter vorne. Leer lassen, damit das Foto ans Ende gestellt wird."
